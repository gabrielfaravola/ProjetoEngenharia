
name: CI 

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

  workflow_dispatch:


  

jobs:

  java:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build + Test Java
        working-directory: 'Sistema (JAVA)/app/'
        run: mvn clean install

  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        working-directory: 'AI (Python)/app/'
        run: pip install -r requirements.txt

      - name: Rodar testes
        working-directory: 'AI (Python)/app/**'
        run: pytest
